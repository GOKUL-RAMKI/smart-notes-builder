<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notes Builder - Upload Notes</title>
</head>
<body>

    <h1>Upload Notes</h1>

    <a href="{{ url_for('home') }}">
        Back to Home
    </a>

    <hr>

    <form
        method="POST"
        action="{{ url_for('process_upload') }}"
        enctype="multipart/form-data">

        <div>
            <label for="subject_id">
                Subject:
            </label>

            <select
                name="subject_id"
                id="subject_id"
                required>

                <option value="">
                    -- Select Subject --
                </option>

                {% for subject in subjects %}
                <option value="{{ subject.id }}">
                    {{ subject.name }}
                </option>
                {% endfor %}

            </select>
        </div>

        <br>

        <div>
            <label for="images">
                Upload Images:
            </label>

            <input
                type="file"
                id="images"
                name="images"
                accept=".jpg,.jpeg,.png"
                multiple
                required>
        </div>

        <br>

        <div>
            <label>
                <input
                    type="checkbox"
                    name="preserve_images">

                Preserve Original Images
            </label>
        </div>

        <br>

        <button type="submit">
            Process Notes
        </button>

    </form>

    <hr>

    <h3>Rules</h3>

    <ul>
        <li>Minimum 1 image</li>
        <li>Maximum 8 images</li>
        <li>Allowed formats: JPG, JPEG, PNG</li>
        <li>Maximum size: 10 MB per image</li>
    </ul>

</body>
</html>
