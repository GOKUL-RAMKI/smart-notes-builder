<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload Notes</title>

    <link rel="stylesheet"
        href="{{ url_for('static',
        filename='css/theme.css') }}">

    <link rel="stylesheet"
        href="{{ url_for('static',
        filename='css/upload.css') }}">
</head>
<body>

<div class="container">

    <a class="back-link"
       href="{{ url_for('home') }}">
        ← Back to Home
    </a>

    <div class="card">

        <h1>Upload Notes</h1>

        <form
            method="POST"
            action="{{ url_for('upload_page') }}"
            enctype="multipart/form-data">

            <div class="form-group">

                <label for="subject_id">
                    Subject
                </label>

                <select
                    name="subject_id"
                    id="subject_id"
                    required>

                    <option value="">
                        Select Subject
                    </option>

                    {% for subject in subjects %}
                    <option value="{{ subject.id }}">
                        {{ subject.name }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <div class="form-group">

                <label for="images">
                    Upload Images
                </label>

                <input
                    type="file"
                    id="images"
                    name="images"
                    accept=".jpg,.jpeg,.png"
                    multiple
                    required>

            </div>

            
            <div id="preserve-container">
            </div>
            <br>

            <div id="preserve-controls"
                 style="display:none;">

                <button
                    type="button"
                    class="secondary-btn"
                    id="select-all-btn">

                    Select All

                </button>

                <button
                    type="button"
                    class="secondary-btn"
                    id="clear-all-btn">

                    Clear All

                </button>

            </div>

            <br>

            <button
                type="submit"
                class="primary-btn">

                Process Notes

            </button>

            {% if success %}
                <div id="upload-success" class="success-box">

                    {{ success }}

                    <br><br>

                    <a href="/subject/{{ subject_id }}/download/{{ file_name }}">
                        Download {{ file_name }}
                    </a>

                </div>
            {% endif %}
            {% if error %}

                <div id="upload-error" class="error-box">
                    {{ error }}
                </div>

            {% endif %}
        </form>

    </div>

    <div class="rules">

        <h3>Rules</h3>

        <ul>
            <li>Minimum 1 image</li>
            <li>Maximum 8 images</li>
            <li>Allowed formats: JPG, JPEG, PNG</li>
            <li>Maximum size: 10 MB per image</li>
        </ul>

    </div>

</div>

<script>

document.getElementById("images")
.addEventListener(
    "change",
    function ()
    {
        const container =
            document.getElementById(
                "preserve-container"
            );

        container.innerHTML = "";
        container.style.display = "grid";

        if (this.files.length === 0)
        {
            container.style.display = "none";
            controls.style.display = "none";
            return;
        }

        const controls =
            document.getElementById(
                "preserve-controls"
            );

        controls.style.display =
            this.files.length > 0
            ? "block"
            : "none";

        if (this.files.length === 0)
        {
            return;
        }

        const heading =
            document.createElement("h3");

        heading.textContent =
            "Select Images To Preserve";
        
        container.style.display = "grid";

        container.appendChild(
            heading
        );

        for (
            let i = 0;
            i < this.files.length;
            i++
        )
        {
            const file =
                this.files[i];

            const wrapper =
                document.createElement("div");

            wrapper.className =
                "preserve-card";

            const image =
                document.createElement("img");

            const reader =
                new FileReader();

            reader.onload =
                function(e)
                {
                    image.src =
                        e.target.result;
                };

            reader.readAsDataURL(file);

            const checkbox =
                document.createElement(
                    "input"
                );

            checkbox.type =
                "checkbox";

            checkbox.name =
                "preserve_files";

            checkbox.value =
                file.name;

            const label =
                document.createElement(
                    "div"
                );

            label.textContent =
                file.name;

            wrapper.appendChild(image);
            wrapper.appendChild(checkbox);
            wrapper.appendChild(label);

            container.appendChild(wrapper);
        }
    }
);

document
.getElementById("select-all-btn")
.addEventListener(
    "click",
    function ()
    {
        document
        .querySelectorAll(
            'input[name="preserve_files"]'
        )
        .forEach(
            checkbox =>
            {
                checkbox.checked =
                    true;
            }
        );
    }
);

document
.getElementById("clear-all-btn")
.addEventListener(
    "click",
    function ()
    {
        document
        .querySelectorAll(
            'input[name="preserve_files"]'
        )
        .forEach(
            checkbox =>
            {
                checkbox.checked =
                    false;
            }
        );
    }
);
document
.getElementById("images")
.addEventListener(
    "change",
    function ()
    {
        const errorBox =
            document.getElementById(
                "upload-error"
            );

        if (errorBox)
        {
            errorBox.remove();
        }

        const successBox =
            document.getElementById(
                "upload-success"
            );

        if (successBox)
        {
            successBox.remove();
        }
    }
);
</script>
<script src="{{ url_for(
    'static',
    filename='js/theme.js'
) }}"></script>
</body>
</html>
