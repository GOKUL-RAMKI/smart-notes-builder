<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notes Builder - Upload Notes</title>
</head>
<body>

    <h1>Upload Notes</h1>

    <a href="{{ url_for('home') }}">
        Back to Home
    </a>

    <hr>

    <form
        method="POST"
        action="{{ url_for('process_upload') }}"
        enctype="multipart/form-data">

        <div>
            <label for="subject_id">
                Subject:
            </label>

            <select
                name="subject_id"
                id="subject_id"
                required>

                <option value="">
                    -- Select Subject --
                </option>

                {% for subject in subjects %}
                <option value="{{ subject.id }}">
                    {{ subject.name }}
                </option>
                {% endfor %}

            </select>
        </div>

        <br>

        <div>
            <label for="images">
                Upload Images:
            </label>

            <input
                type="file"
                id="images"
                name="images"
                accept=".jpg,.jpeg,.png"
                multiple
                required>
        </div>

        <br>
        <div id="preserve-controls" style="display:none;">
            <button type="button" id="select-all-btn">
                Select All
            </button>

            <button type="button" id="clear-all-btn">
                Clear All
            </button>
        </div>
        <div id="preserve-container">
        </div>
        

        <br>

        <button type="submit">
            Process Notes
        </button>

    </form>

    <hr>

    <h3>Rules</h3>

    <ul>
        <li>Minimum 1 image</li>
        <li>Maximum 8 images</li>
        <li>Allowed formats: JPG, JPEG, PNG</li>
        <li>Maximum size: 10 MB per image</li>
    </ul>
    <script>

        document.getElementById("images").addEventListener(
                "change",
                function ()
                {
                    const container =
                        document.getElementById(
                            "preserve-container"
                        );

                    container.innerHTML = "";

                    const controls = document.getElementById("preserve-controls");

                    controls.style.display = "block";

                    if (this.files.length === 0)
                    {
                        controls.style.display = "none";
                        return;
                    }

                    if (this.files.length === 0)
                    {
                        return;
                    }

                    const heading =
                        document.createElement("h3");

                    heading.textContent =
                        "Select Images To Preserve";

                    container.appendChild(
                        heading
                    );

                    for (
                        let i = 0;
                        i < this.files.length;
                        i++
                    )
                    {
                        const file =
                            this.files[i];

                        const wrapper =
                            document.createElement("div");

                        wrapper.style.border =
                            "1px solid #ccc";

                        wrapper.style.padding =
                            "10px";

                        wrapper.style.marginBottom =
                            "10px";

                        wrapper.style.display =
                            "inline-block";

                        wrapper.style.textAlign =
                            "center";

                        wrapper.style.marginRight =
                            "10px";

                        const image =
                            document.createElement("img");

                        image.style.width =
                            "150px";

                        image.style.height =
                            "150px";

                        image.style.objectFit =
                            "contain";

                        image.style.display =
                            "block";

                        image.style.marginBottom =
                            "10px";

                        const reader =
                            new FileReader();

                        reader.onload =
                            function(e)
                            {
                                image.src =
                                    e.target.result;
                            };

                        reader.readAsDataURL(file);

                        const checkbox =
                            document.createElement(
                                "input"
                            );

                        checkbox.type =
                            "checkbox";

                        checkbox.name =
                            "preserve_files";

                        checkbox.value =
                            file.name;

                        const label =
                            document.createElement(
                                "label"
                            );

                        label.textContent =
                            file.name;

                        wrapper.appendChild(image);

                        wrapper.appendChild(checkbox);

                        wrapper.appendChild(label);

                        container.appendChild(wrapper);
                    }
                }
            );
        
        document
            .getElementById(
                "select-all-btn"
            )
            .addEventListener(
                "click",
                function ()
                {
                    document
                        .querySelectorAll(
                            'input[name="preserve_files"]'
                        )
                        .forEach(
                            checkbox =>
                            {
                                checkbox.checked =
                                    true;
                            }
                        );
                }
            );

        document
            .getElementById(
                "clear-all-btn"
            )
            .addEventListener(
                "click",
                function ()
                {
                    document
                        .querySelectorAll(
                            'input[name="preserve_files"]'
                        )
                        .forEach(
                            checkbox =>
                            {
                                checkbox.checked =
                                    false;
                            }
                        );
                }
            );
    </script>
</body>
</html>
