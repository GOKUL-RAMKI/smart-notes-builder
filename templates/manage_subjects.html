<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subjects</title>
    <link rel="stylesheet"
          href="{{ url_for( 'static', filename='css/theme.css') }}">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/manage_subjects.css') }}">
</head>

<body>

<div class="container">

    <a
        class="back-link"
        href="{{ url_for('home') }}">
        ← Back to Home
    </a>
    <div class="card">

        <h2>Create Subject</h2>

        <form method="POST"
              action="{{ url_for('create_subject_route') }}">

            <input
                type="text"
                name="subject_name"
                placeholder="Enter subject name"
                required>

            <button type="submit">
                Create Subject
            </button>

        </form>

    </div>

    <h2>Subjects ({{ subjects|length }})</h2>

    <div class="subject-grid">

        {% for subject in subjects %}

        <a class="subject-card"
           href="{{ url_for('subject_page', subject_id=subject.id) }}">

            {{ subject.name }}

        </a>

        {% endfor %}

    </div>

</div>
<script src="{{ url_for(
    'static',
    filename='js/theme.js') }}">
</script>
</body>
</html>
